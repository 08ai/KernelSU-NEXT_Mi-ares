name: Build
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Setup NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip
        echo "NDK=$(pwd)/android-ndk-r27c" >> $GITHUB_ENV
    - name: Fetch KernelSU
      run: curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -s v0.9.5
    - name: Configure
      run: |
        export PATH=${{ env.NDK }}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        export ARCH=arm64
        make ares_user_defconfig
        scripts/config --enable KALLSYMS_ALL
        scripts/config --set-str LOCALVERSION "-ksu"
        make olddefconfig
    - name: Build
      run: |
        export PATH=${{ env.NDK }}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        make ARCH=arm64 -j$(nproc) CC=aarch64-linux-android21-clang LD=aarch64-linux-android21-ld CLANG_TRIPLE=aarch64-linux-gnu-
    - uses: actions/upload-artifact@v4
      with:
        name: Image
        path: arch/arm64/boot/Image
