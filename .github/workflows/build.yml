name: Build
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install clang-14
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq clang-14 lld-14 gcc flex bison bc libssl-dev
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
        sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-14 100
    - name: Fetch KernelSU
      run: curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -s v0.9.5
    - name: Configure
      run: |
        export ARCH=arm64
        make ares_user_defconfig
        scripts/config --enable KALLSYMS_ALL --set-str LOCALVERSION "-ksu"
        make olddefconfig
    - name: Build
      run: make ARCH=arm64 -j$(nproc) CC=clang LD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- HOSTCC=gcc
    - uses: actions/upload-artifact@v4
      with: {name: Image, path: arch/arm64/boot/Image}
